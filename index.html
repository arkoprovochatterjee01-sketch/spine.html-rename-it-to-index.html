<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" id="metaDescription" content="A personal reading shelf for saved articles and files.">
<title>Spine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14151A;
    --ink-2:#1C1E26;
    --ink-3:#25272F;
    --paper:#EFE9DC;
    --paper-2:#E4DDC9;
    --teal:#2F6F62;
    --teal-light:#4C9A89;
    --indigo:#4A4E82;
    --indigo-light:#6E73B0;
    --gold:#C9A227;
    --text-light:#EDEAE0;
    --text-muted:#8B8878;
    --text-ink:#2A2820;
    --text-ink-muted:#6B6552;
    --line-height-count: 200px;
    --row-gap: 22px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--text-light);
    font-family:'JetBrains Mono',monospace;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px;}

  /* ---------- Header ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:28px 32px 18px;
    max-width:1100px;margin:0 auto;
  }
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand h1{
    font-family:'Fraunces',serif;font-weight:700;font-size:28px;
    margin:0;letter-spacing:-0.01em;color:var(--text-light);
  }
  .brand span{font-size:11px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;}
  .add-btn{
    background:var(--gold);color:var(--ink);border:none;
    width:42px;height:42px;border-radius:50%;font-size:22px;
    display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease, background .15s ease;
    box-shadow:0 2px 10px rgba(201,162,39,0.25);
  }
  .add-btn:hover{transform:scale(1.08);background:#DDB52E;}

  /* ---------- Shelf ---------- */
  main{max-width:1100px;margin:0 auto;padding:10px 32px 80px;}
  .shelf{
    display:flex;flex-wrap:wrap;
    gap:24px var(--row-gap);
    align-items:flex-end;
    padding-top:10px;
  }
  .spine{
    position:relative;
    width:52px;height:var(--line-height-count);
    border-radius:3px 3px 2px 2px;
    display:flex;align-items:flex-start;justify-content:center;
    padding:14px 0 20px;
    border:none;
    box-shadow:inset -3px 0 6px rgba(0,0,0,0.22), inset 2px 0 3px rgba(255,255,255,0.06);
    transition:transform .18s ease, box-shadow .18s ease;
    overflow:hidden;
  }
  .spine::after{
    content:'';position:absolute;left:0;right:0;bottom:0;
    height:7px;background:rgba(0,0,0,0.35);
    border-radius:0 0 2px 2px;
  }
  .spine:hover{transform:translateY(-6px);box-shadow:inset -3px 0 6px rgba(0,0,0,0.22), inset 2px 0 3px rgba(255,255,255,0.08), 0 10px 18px rgba(0,0,0,0.35);}
  .spine.article{background:linear-gradient(180deg,var(--teal-light),var(--teal));}
  .spine.file{background:linear-gradient(180deg,var(--indigo-light),var(--indigo));}
  .spine-title{
    writing-mode:vertical-rl;text-orientation:mixed;
    font-family:'Fraunces',serif;font-weight:600;font-size:13.5px;
    color:rgba(255,255,255,0.94);
    white-space:nowrap;max-height:calc(var(--line-height-count) - 40px);
    overflow:hidden;text-overflow:ellipsis;
    letter-spacing:0.01em;
  }
  .progress-fill{
    position:absolute;left:0;right:0;bottom:0;
    background:rgba(201,162,39,0.55);
    height:0%;
  }
  .spine-remove{
    position:absolute;top:4px;right:4px;
    width:18px;height:18px;border-radius:50%;
    background:rgba(0,0,0,0.35);color:#fff;border:none;
    font-size:11px;line-height:1;display:none;
    align-items:center;justify-content:center;
  }
  .spine:hover .spine-remove{display:flex;}

  /* ---------- Empty state ---------- */
  .empty{
    text-align:center;padding:90px 20px;color:var(--text-muted);
  }
  .empty h2{font-family:'Fraunces',serif;color:var(--text-light);font-weight:600;font-size:22px;margin-bottom:8px;}
  .empty p{font-size:13px;max-width:340px;margin:0 auto;line-height:1.6;}

  /* ---------- Modal (add item) ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(10,10,12,0.72);
    display:none;align-items:center;justify-content:center;z-index:50;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--ink-2);border-radius:10px;
    width:100%;max-width:480px;
    padding:26px;box-shadow:0 20px 50px rgba(0,0,0,0.5);
  }
  .modal h2{font-family:'Fraunces',serif;margin:0 0 16px;font-size:19px;font-weight:600;}
  .tabs{display:flex;gap:6px;margin-bottom:18px;border-bottom:1px solid var(--ink-3);}
  .tab-btn{
    background:none;border:none;color:var(--text-muted);
    padding:9px 4px;font-size:12px;letter-spacing:0.04em;text-transform:uppercase;
    border-bottom:2px solid transparent;margin-bottom:-1px;
  }
  .tab-btn.active{color:var(--gold);border-bottom-color:var(--gold);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.04em;text-transform:uppercase;}
  input[type=text], input[type=url], textarea{
    width:100%;background:var(--ink-3);border:1px solid #34363F;color:var(--text-light);
    border-radius:6px;padding:10px 12px;font-size:13px;margin-bottom:14px;
  }
  textarea{resize:vertical;min-height:120px;line-height:1.5;}
  .file-drop{
    border:1.5px dashed #3A3D48;border-radius:8px;padding:24px;text-align:center;
    color:var(--text-muted);font-size:12px;margin-bottom:14px;
  }
  .file-drop input{margin-top:10px;}
  .primary-btn{
    background:var(--gold);color:var(--ink);border:none;border-radius:6px;
    padding:11px 18px;font-size:13px;font-weight:600;width:100%;
  }
  .primary-btn:disabled{opacity:0.5;cursor:default;}
  .modal-close{
    background:none;border:none;color:var(--text-muted);float:right;font-size:16px;
  }
  .status-msg{font-size:12px;margin:-6px 0 14px;line-height:1.5;}
  .status-msg.error{color:#E08B7A;}
  .status-msg.ok{color:var(--teal-light);}

  /* ---------- Reader ---------- */
  .reader{
    position:fixed;inset:0;background:var(--paper);color:var(--text-ink);
    display:none;flex-direction:column;z-index:60;
  }
  .reader.show{display:flex;}
  .reader-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;border-bottom:1px solid rgba(42,40,32,0.12);
    background:var(--paper);position:sticky;top:0;z-index:2;
  }
  .reader-bar .left{display:flex;align-items:center;gap:14px;min-width:0;}
  .reader-title{
    font-family:'Fraunces',serif;font-size:14px;font-weight:600;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:44vw;
  }
  .icon-btn{
    background:none;border:none;color:var(--text-ink);font-size:15px;
    width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  }
  .icon-btn:hover{background:rgba(42,40,32,0.08);}
  .reader-controls{display:flex;align-items:center;gap:4px;}
  .reader-body{
    flex:1;overflow-y:auto;padding:50px 24px 140px;
    position:relative;
  }
  .reader-column{
    max-width:640px;margin:0 auto;
    font-family:'Source Serif 4',serif;font-size:19px;line-height:1.75;
    color:var(--text-ink);
  }
  .reader-column.sans{font-family:'JetBrains Mono',monospace;font-size:15px;line-height:1.85;}
  .reader-column p{margin:0 0 1.2em;}
  .reader-heading{
    font-family:'Fraunces',serif;font-weight:700;
    font-size:28px;line-height:1.25;margin:0 0 0.9em;
    max-width:640px;margin-left:auto;margin-right:auto;
  }
  .reader-column h1,.reader-column h2,.reader-column h3{font-family:'Fraunces',serif;font-weight:700;margin:1.4em 0 .5em;}
  .ribbon-track{
    position:fixed;right:14px;top:70px;bottom:20px;width:3px;
    background:rgba(42,40,32,0.12);border-radius:3px;z-index:2;
  }
  .ribbon-fill{
    position:absolute;top:0;left:0;right:0;background:var(--gold);border-radius:3px;height:0%;
  }
  .font-size-label{font-size:12px;color:var(--text-ink-muted);width:20px;text-align:center;}

  @media (max-width:640px){
    header{padding:20px 18px 12px;}
    main{padding:0 18px 60px;}
    .reader-title{max-width:50vw;}
    .reader-body{padding:34px 18px 120px;}
    .reader-column{font-size:17.5px;}
  }
  @media (prefers-reduced-motion:reduce){
    .spine, .add-btn{transition:none;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>Spine</h1>
    <span>your shelf</span>
  </div>
  <button class="add-btn" id="openAdd" aria-label="Add item">+</button>
</header>

<main>
  <div class="shelf" id="shelf"></div>
  <div class="empty" id="emptyState" style="display:none;">
    <h2>The shelf is empty</h2>
    <p>Save an article by URL or upload a file, and it'll show up here as a spine you can pull out and read.</p>
  </div>
</main>

<!-- Add modal -->
<div class="overlay" id="addOverlay">
  <div class="modal">
    <button class="modal-close" id="closeAdd" aria-label="Close">✕</button>
    <h2>Add to shelf</h2>
    <div class="tabs">
      <button class="tab-btn active" data-tab="url">From URL</button>
      <button class="tab-btn" data-tab="file">Upload file</button>
      <button class="tab-btn" data-tab="paste">Paste text</button>
    </div>

    <div class="tab-panel active" id="tab-url">
      <label for="urlInput">Article URL</label>
      <input type="url" id="urlInput" placeholder="https://example.com/article">
      <div class="status-msg" id="urlStatus"></div>
      <button class="primary-btn" id="fetchUrlBtn">Fetch article</button>
    </div>

    <div class="tab-panel" id="tab-file">
      <label>File</label>
      <div class="file-drop">
        Supports .txt, .md, and .pdf
        <input type="file" id="fileInput" accept=".txt,.md,.pdf">
      </div>
      <div class="status-msg" id="fileStatus"></div>
    </div>

    <div class="tab-panel" id="tab-paste">
      <label for="pasteTitle">Title</label>
      <input type="text" id="pasteTitle" placeholder="Untitled">
      <label for="pasteBody">Text</label>
      <textarea id="pasteBody" placeholder="Paste the text you want to read..."></textarea>
      <button class="primary-btn" id="savePasteBtn">Add to shelf</button>
    </div>
  </div>
</div>

<!-- Reader -->
<div class="reader" id="reader">
  <div class="reader-bar">
    <div class="left">
      <button class="icon-btn" id="closeReader" aria-label="Back to shelf">←</button>
      <div class="reader-title" id="readerTitle"></div>
    </div>
    <div class="reader-controls">
      <button class="icon-btn" id="fontDown" aria-label="Smaller text">A−</button>
      <span class="font-size-label" id="fontSizeLabel">19</span>
      <button class="icon-btn" id="fontUp" aria-label="Larger text">A+</button>
      <button class="icon-btn" id="fontToggle" aria-label="Toggle typeface" title="Toggle typeface">Aa</button>
    </div>
  </div>
  <div class="reader-body" id="readerBody">
    <main>
      <article id="readerArticle" itemscope itemtype="https://schema.org/Article">
        <h1 id="readerHeading" class="reader-heading" itemprop="headline"></h1>
        <div class="reader-column" id="readerColumn" itemprop="articleBody"></div>
      </article>
    </main>
  </div>
  <div class="ribbon-track"><div class="ribbon-fill" id="ribbonFill"></div></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ---------- Storage adapter (works standalone, no Claude runtime required) ----------
const storage = {
  async get(key){
    try{
      const raw = localStorage.getItem('spine:'+key);
      if(raw === null) return null;
      return { key, value: raw };
    }catch(e){ console.error('storage.get failed', e); return null; }
  },
  async set(key, value){
    try{
      localStorage.setItem('spine:'+key, value);
      return { key, value };
    }catch(e){ console.error('storage.set failed', e); return null; }
  },
  async delete(key){
    try{ localStorage.removeItem('spine:'+key); return { key, deleted:true }; }
    catch(e){ console.error('storage.delete failed', e); return null; }
  }
};

// ---------- State ----------
let library = [];
let prefs = { fontSize: 19, sans: false };
let currentReadingId = null;
let scrollSaveTimer = null;

const $ = (id) => document.getElementById(id);

// ---------- Storage helpers ----------
async function loadLibrary(){
  try{
    const res = await storage.get('library-index');
    library = res ? JSON.parse(res.value) : [];
  }catch(e){ library = []; }
  render();
}
async function saveLibraryIndex(){
  try{ await storage.set('library-index', JSON.stringify(library)); }
  catch(e){ console.error('Could not save library index', e); }
}
async function saveContent(id, text){
  try{
    const result = await storage.set('content:'+id, text);
    return !!result;
  }catch(e){ console.error('Could not save content', e); return false; }
}
async function getContent(id){
  try{ const res = await storage.get('content:'+id); return res ? res.value : ''; }
  catch(e){ console.error('Could not load content', e); return null; }
}
async function loadPrefs(){
  try{
    const res = await storage.get('reader-prefs');
    if(res) prefs = JSON.parse(res.value);
  }catch(e){}
}
async function savePrefs(){
  try{ await storage.set('reader-prefs', JSON.stringify(prefs)); }catch(e){}
}

// ---------- Rendering ----------
function render(){
  const shelf = $('shelf');
  const empty = $('emptyState');
  shelf.innerHTML = '';
  if(library.length === 0){
    empty.style.display = 'block';
    shelf.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  shelf.style.display = 'flex';

  library.slice().sort((a,b)=>b.addedAt-a.addedAt).forEach(item=>{
    const spine = document.createElement('button');
    spine.className = 'spine ' + item.type;
    spine.title = item.title;
    spine.setAttribute('aria-label', 'Open ' + item.title);

    const fill = document.createElement('div');
    fill.className = 'progress-fill';
    fill.style.height = Math.round((item.progress||0)*100) + '%';
    spine.appendChild(fill);

    const titleEl = document.createElement('span');
    titleEl.className = 'spine-title';
    titleEl.textContent = item.title;
    spine.appendChild(titleEl);

    const rm = document.createElement('button');
    rm.className = 'spine-remove';
    rm.textContent = '✕';
    rm.setAttribute('aria-label', 'Remove ' + item.title);
    rm.onclick = (e)=>{ e.stopPropagation(); removeItem(item.id); };
    spine.appendChild(rm);

    spine.onclick = ()=> openReader(item.id);
    shelf.appendChild(spine);
  });
}

async function removeItem(id){
  library = library.filter(i=>i.id!==id);
  await saveLibraryIndex();
  try{ await storage.delete('content:'+id); }catch(e){}
  render();
}

// ---------- Add modal ----------
$('openAdd').onclick = ()=> $('addOverlay').classList.add('show');
$('closeAdd').onclick = ()=> $('addOverlay').classList.remove('show');
$('addOverlay').addEventListener('click', (e)=>{ if(e.target.id==='addOverlay') $('addOverlay').classList.remove('show'); });

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    $('tab-'+btn.dataset.tab).classList.add('active');
  };
});

function makeId(){ return 'i' + Date.now() + Math.random().toString(36).slice(2,8); }
function wordCount(t){ return (t.match(/\S+/g)||[]).length; }

async function addItem({title, type, content}){
  const id = makeId();
  const ok = await saveContent(id, content);
  if(!ok){ throw new Error('Could not save this item — try again.'); }
  const item = {
    id, title: title || 'Untitled', type,
    addedAt: Date.now(), progress: 0,
    wordCount: wordCount(content)
  };
  library.push(item);
  await saveLibraryIndex();
  render();
  return id;
}

// --- URL fetch tab ---
$('fetchUrlBtn').onclick = async ()=>{
  const url = $('urlInput').value.trim();
  const statusEl = $('urlStatus');
  if(!url){ statusEl.textContent='Enter a URL first.'; statusEl.className='status-msg error'; return; }
  statusEl.textContent = 'Fetching...'; statusEl.className='status-msg';
  $('fetchUrlBtn').disabled = true;
  try{
    const controller = new AbortController();
    const timeout = setTimeout(()=>controller.abort(), 20000);
    const res = await fetch('https://r.jina.ai/' + url, { signal: controller.signal });
    clearTimeout(timeout);
    if(!res.ok) throw new Error('Fetch failed: ' + res.status);
    let text = await res.text();
    let title = url;
    const titleMatch = text.match(/^Title:\s*(.+)$/m);
    if(titleMatch) title = titleMatch[1].trim();
    const contentMarker = text.indexOf('Markdown Content:');
    if(contentMarker !== -1){ text = text.slice(contentMarker + 'Markdown Content:'.length).trim(); }
    text = cleanArticleText(text);
    if(!text || text.length < 20) throw new Error('No readable content found');
    await addItem({ title, type:'article', content:text });
    statusEl.textContent = 'Added to shelf.'; statusEl.className='status-msg ok';
    $('urlInput').value='';
    setTimeout(()=>{ $('addOverlay').classList.remove('show'); statusEl.textContent=''; }, 700);
  }catch(err){
    if(err && err.message && err.message.indexOf('save') !== -1){
      statusEl.textContent = "Fetched the article, but couldn't save it. Try again in a moment.";
    } else {
      statusEl.textContent = "Couldn't fetch that page automatically (some sites block it). Try the Paste text tab instead.";
    }
    statusEl.className='status-msg error';
  }finally{
    $('fetchUrlBtn').disabled = false;
  }
};

// --- File upload tab ---
$('fileInput').onchange = async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const statusEl = $('fileStatus');
  statusEl.textContent = 'Reading file...'; statusEl.className='status-msg';
  try{
    let text = '';
    const name = file.name.replace(/\.(txt|md|pdf)$/i,'');
    if(file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')){
      const buf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data:buf}).promise;
      const pages = [];
      for(let p=1; p<=pdf.numPages; p++){
        const page = await pdf.getPage(p);
        const content = await page.getTextContent();
        const strings = content.items.map(it=>it.str);
        pages.push(strings.join(' '));
      }
      text = pages.join('\n\n');
    } else {
      text = await file.text();
    }
    if(!text || text.trim().length < 5) throw new Error('empty');
    await addItem({ title:name, type:'file', content:text });
    statusEl.textContent = 'Added to shelf.'; statusEl.className='status-msg ok';
    setTimeout(()=>{ $('addOverlay').classList.remove('show'); statusEl.textContent=''; $('fileInput').value=''; }, 700);
  }catch(err){
    statusEl.textContent = (err && err.message && err.message.indexOf('save') !== -1)
      ? "Read the file, but couldn't save it. Try again in a moment."
      : "Couldn't read that file.";
    statusEl.className='status-msg error';
  }
};

// --- Paste tab ---
$('savePasteBtn').onclick = async ()=>{
  const title = $('pasteTitle').value.trim();
  const body = $('pasteBody').value.trim();
  if(!body){ return; }
  try{
    await addItem({ title: title || 'Untitled', type:'file', content: body });
    $('pasteTitle').value=''; $('pasteBody').value='';
    $('addOverlay').classList.remove('show');
  }catch(err){
    alert("Couldn't save that — try again in a moment.");
  }
};

// ---------- Reader ----------
function cleanArticleText(text){
  if(!text) return text;
  return text
    // drop markdown images entirely: ![alt](url)
    .replace(/!\[[^\]]*\]\([^)]*\)/g, '')
    // markdown links -> keep just the visible text: [text](url)
    .replace(/\[([^\]]*)\]\(([^)]*)\)/g, '$1')
    // stray bare image/asset URLs left on their own line
    .replace(/^\s*(https?:\/\/\S+\.(?:png|jpe?g|gif|webp|svg)\S*)\s*$/gim, '')
    // collapse leftover blank lines
    .replace(/\n{3,}/g, '\n\n')
    .replace(/[ \t]{2,}/g, ' ')
    .trim();
}

function textToParagraphs(text){
  const cleaned = cleanArticleText(text);
  return cleaned.split(/\n{2,}/).map(p=>p.trim()).filter(Boolean)
    .map(p=>'<p>'+p.replace(/</g,'&lt;').replace(/\n/g,'<br>')+'</p>').join('');
}

async function openReader(id){
  const item = library.find(i=>i.id===id);
  if(!item) return;
  currentReadingId = id;
  const content = await getContent(id);

  document.title = item.title + ' — Spine';
  $('readerTitle').textContent = item.title;
  $('readerHeading').textContent = item.title;

  let metaDesc = document.querySelector('meta[name="description"]');
  if(!metaDesc){
    metaDesc = document.createElement('meta');
    metaDesc.setAttribute('name','description');
    document.head.appendChild(metaDesc);
  }
  const plainExcerpt = cleanArticleText(content).replace(/\s+/g,' ').trim().slice(0,180);
  metaDesc.setAttribute('content', plainExcerpt);

  if(content === null || content.trim().length === 0){
    $('readerColumn').innerHTML = '<p style="color:var(--text-ink-muted);font-style:italic;">This one didn\'t save properly, so there\'s nothing to show. Go back and remove it, then try adding it again.</p>';
  } else {
    $('readerColumn').innerHTML = textToParagraphs(content);
  }
  $('readerColumn').className = 'reader-column' + (prefs.sans ? ' sans' : '');
  $('readerColumn').style.fontSize = prefs.fontSize + 'px';
  $('fontSizeLabel').textContent = prefs.fontSize;
  $('reader').classList.add('show');
  $('readerBody').scrollTop = 0;
  requestAnimationFrame(()=>{
    const target = (item.progress||0) * ($('readerBody').scrollHeight - $('readerBody').clientHeight);
    $('readerBody').scrollTop = target;
    updateRibbon();
  });
}

$('closeReader').onclick = ()=>{ $('reader').classList.remove('show'); render(); };

function updateRibbon(){
  const el = $('readerBody');
  const max = el.scrollHeight - el.clientHeight;
  const pct = max > 0 ? el.scrollTop / max : 0;
  $('ribbonFill').style.height = Math.round(pct*100) + '%';
  return pct;
}

$('readerBody').addEventListener('scroll', ()=>{
  const pct = updateRibbon();
  clearTimeout(scrollSaveTimer);
  scrollSaveTimer = setTimeout(async ()=>{
    const item = library.find(i=>i.id===currentReadingId);
    if(item){ item.progress = Math.max(0, Math.min(1,pct)); await saveLibraryIndex(); }
  }, 500);
});

$('fontUp').onclick = ()=>{ prefs.fontSize = Math.min(30, prefs.fontSize+1); applyFont(); savePrefs(); };
$('fontDown').onclick = ()=>{ prefs.fontSize = Math.max(14, prefs.fontSize-1); applyFont(); savePrefs(); };
$('fontToggle').onclick = ()=>{ prefs.sans = !prefs.sans; applyFont(); savePrefs(); };
function applyFont(){
  $('readerColumn').style.fontSize = prefs.fontSize + 'px';
  $('readerColumn').className = 'reader-column' + (prefs.sans ? ' sans' : '');
  $('fontSizeLabel').textContent = prefs.fontSize;
}

document.addEventListener('keydown', (e)=>{
  if(e.key === 'Escape'){
    if($('reader').classList.contains('show')){ $('reader').classList.remove('show'); render(); }
    if($('addOverlay').classList.contains('show')){ $('addOverlay').classList.remove('show'); }
  }
});

// ---------- Init ----------
(async function init(){
  await loadPrefs();
  await loadLibrary();
})();
</script>
</body>
</html>
